name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Lint Backend
        working-directory: ./backend
        run: npm ci && npm run lint || true

      - name: Lint Frontend
        working-directory: ./frontend
        run: npm ci && npm run lint || true

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-backend:${{ github.sha }},${{ secrets.DOCKERHUB_USERNAME }}/ai-task-backend:latest

      - name: Build and Push Worker
        uses: docker/build-push-action@v4
        with:
          context: ./worker
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-worker:${{ github.sha }},${{ secrets.DOCKERHUB_USERNAME }}/ai-task-worker:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-frontend:${{ github.sha }},${{ secrets.DOCKERHUB_USERNAME }}/ai-task-frontend:latest

      - name: Update Infra Repo Image Tags
        run: |
          git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository_owner }}/ai-task-platform-infra.git
          cd ai-task-platform-infra
          sed -i "s|ai-task-backend:.*|ai-task-backend:${{ github.sha }}|g" k8s/backend.yaml
          sed -i "s|ai-task-worker:.*|ai-task-worker:${{ github.sha }}|g" k8s/worker.yaml
          sed -i "s|ai-task-frontend:.*|ai-task-frontend:${{ github.sha }}|g" k8s/frontend.yaml
          git config user.email "ci@github.com"
          git config user.name "CI Bot"
          git add .
          git commit -m "Update image tags to ${{ github.sha }}" || echo "No changes"
          git push
